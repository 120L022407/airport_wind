experiment:
  name: hcan_baseline_15min_psloss
  seed: 7

runtime:
  output_root: outputs

data:
  root: ${AIRPORT_WIND_DATA_ROOT:-data}
  source: series_15min
  airports: [ZGSZ, ZGGG, VHHH, VMMC]
  target_airports: [ZGSZ]
  input_variables:
    [
      sknt,
      wind_dir_sin,
      wind_dir_cos,
      tmpf,
      alti,
      dwpf,
      relh,
      gust,
      hour_sin,
      hour_cos,
      month_sin,
      month_cos,
      day_of_year_norm,
    ]
  target_variables: [sknt]
  time_resolution: 15min
  input_steps: 96
  forecast_steps: 96

normalization:
  enabled: true
  method: zscore
  fit_split: train
  apply_to_inputs: true

loss:
  name: composite
  terms:
    - name: hcan_auxiliary
      weight: 1.0
    - name: patch_wise_structural
      weight: 3.0
      params:
        patch_len_threshold: 24
        mask_mode: all_points

model:
  name: hcan
  backbone_hidden_size: 64
  backbone_num_layers: 1
  backbone_dropout: 0.0
  hidden_dim: 32
  num_coarse: 4
  num_fine: 8
  lambda_cls: 1.0
  lambda_reg: 1.0
  lambda_acl: 1.0
  lambda_direct: 1.0

trainer:
  device: cuda
  batch_size: 128
  epochs: 50
  patience: 8
  learning_rate: 0.001
  weight_decay: 0.0
  min_delta: 0.0

evaluation:
  metrics: [mae, rmse, bias]
  real_observation_only: true

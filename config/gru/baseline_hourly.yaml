experiment:
  name: gru_baseline_hourly
  seed: 7

runtime:
  output_root: outputs

data:
  root: ${AIRPORT_WIND_DATA_ROOT:-data}
  source: series
  airports: [ZGSZ, ZGGG, VHHH, VMMC]
  input_variables:
    [
      sknt,
      wind_dir_sin,
      wind_dir_cos,
      tmpf,
      alti,
      dwpf,
      relh,
      gust,
      hour_sin,
      hour_cos,
      month_sin,
      month_cos,
      day_of_year_norm,
    ]
  target_variables: [sknt]
  time_resolution: 1h
  input_steps: 24
  forecast_steps: 24

normalization:
  enabled: true
  method: zscore
  fit_split: train
  apply_to_inputs: true

model:
  name: gru
  hidden_size: 16

trainer:
  ridge_lambda: 0.001

evaluation:
  metrics: [mae, rmse, bias]
  real_observation_only: true

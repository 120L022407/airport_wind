experiment:
  name: timebridge_baseline_15min
  seed: 7

runtime:
  output_root: outputs

data:
  root: ${AIRPORT_WIND_DATA_ROOT:-data}
  source: series_15min
  airports: [ZGSZ, ZGGG, VHHH, VMMC]
  target_airports: [ZGSZ]
  input_variables:
    [
      sknt,
      wind_dir_sin,
      wind_dir_cos,
      tmpf,
      alti,
      dwpf,
      relh,
      gust,
      hour_sin,
      hour_cos,
      month_sin,
      month_cos,
      day_of_year_norm,
    ]
  target_variables: [sknt]
  time_resolution: 15min
  input_steps: 96
  forecast_steps: 96

normalization:
  enabled: true
  method: zscore
  fit_split: train
  apply_to_inputs: true

model:
  name: timebridge
  period: 24
  num_p: 2
  ia_layers: 1
  pd_layers: 1
  ca_layers: 1
  stable_len: 24
  input_feature_count: 13
  shared_time_feature_count: 5
  d_model: 64
  n_heads: 4
  d_ff: 128
  dropout: 0.0
  attn_dropout: 0.1
  activation: gelu

trainer:
  device: cuda
  batch_size: 128
  epochs: 50
  patience: 8
  learning_rate: 0.001
  weight_decay: 0.0
  min_delta: 0.0

evaluation:
  metrics: [mae, rmse, bias]
  real_observation_only: true

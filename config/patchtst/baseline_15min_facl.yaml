experiment:
  name: patchtst_baseline_15min_facl
  seed: 7

runtime:
  output_root: outputs

data:
  root: ${AIRPORT_WIND_DATA_ROOT:-data}
  source: series_15min
  airports: [ZGSZ, ZGGG, VHHH, VMMC]
  target_airports: [ZGSZ]
  input_variables:
    [
      sknt,
      wind_dir_sin,
      wind_dir_cos,
      tmpf,
      alti,
      dwpf,
      relh,
      gust,
      hour_sin,
      hour_cos,
      month_sin,
      month_cos,
      day_of_year_norm,
    ]
  target_variables: [sknt]
  time_resolution: 15min
  input_steps: 96
  forecast_steps: 96

normalization:
  enabled: true
  method: zscore
  fit_split: train
  apply_to_inputs: true

loss:
  name: composite
  terms:
    - name: mse
      weight: 1.0
    - name: fourier_amplitude_correlation
      weight: 0.2
      params:
        mode: paper_random
        alpha: 0.1
        mask_mode: all_points

model:
  name: patchtst
  d_model: 64
  num_layers: 2
  n_heads: 4
  ff_dim: 128
  dropout: 0.1
  patch_len: 24
  stride: 12

trainer:
  device: cuda
  batch_size: 128
  epochs: 50
  patience: 8
  learning_rate: 0.001
  weight_decay: 0.0
  min_delta: 0.0

evaluation:
  metrics: [mae, rmse, bias]
  real_observation_only: true
